  <!-- Thin gold divider line -->
  <line x1="76" y1="12" x2="76" y2="60" stroke="#D97706" stroke-width="0.75" opacity="0.6"/>

  <!-- AARON'S — white on dark -->
  <text x="90" y="34"
    font-family="'Didot', 'Bodoni MT', 'Playfair Display', 'Times New Roman', Georgia, serif"
    font-size="26"
    font-weight="700"
