    <path d="M28 62C14 62 4 52 4 38C4 26 11 16 18 8C17 18 22 24 27 24C24 15 27 5 34 0C31 11 36 20 41 25C46 20 48 14 47 9C53 17 56 26 56 36C56 52 44 62 32 62C32 62 37 54 37 46C37 38 32 33 27 33C27 41 28 52 28 62Z" fill="url(#flameGoldLight)"/>
